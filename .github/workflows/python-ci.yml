name: Python Data Pipeline CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install Java 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub Editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run unit tests with PyTest
      env:
        ENV: TEST
        STORAGE_ENDPOINT: http://localhost:9000
        STORAGE_ACCESS_KEY: mock_user
        STORAGE_SECRET_KEY: mock_password
        LOCAL_LANDING_PYTHON: tests/fixtures/mock_predictive_maintenance.csv
        LOCAL_LANDING_SPARK: file:///${{ github.workspace }}/tests/fixtures/mock_predictive_maintenance.csv
        LOCAL_BRONZE_PATH: file:///${{ github.workspace }}/data/test_delta/bronze
        LOCAL_SILVER_PATH: file:///${{ github.workspace }}/data/test_delta/silver
        LOCAL_GOLD_HEALTH_PATH: file:///${{ github.workspace }}/data/test_delta/gold_health
        LOCAL_GOLD_FAILURES_PATH: file:///${{ github.workspace }}/data/test_delta/gold_failures
        SPARK_LOCAL_DIRS: /tmp/spark-test
      run: |
        # Crear directorios temporales requeridos en el contenedor Linux de GitHub
        mkdir -p tests/fixtures
        mkdir -p data/test_delta
        
        # Ejecutar los tests con las variables ya cargadas en la sesión
        pytest tests/